<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة تسجيل الدخول - منظومة مكة الصحية</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Unbounded:wght@400;700;900&family=Cairo:wght@400;700;900&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Cairo', sans-serif;
        }

        body {
            min-height: 100vh;
            background-image: url('/static/makk.PNG');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.95);
            border: 2px solid #000000;
            padding: 40px 30px;
            width: 100%;
            max-width: 450px;
            backdrop-filter: blur(10px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
        }

        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .login-header h1 {
            font-family: 'Unbounded', sans-serif;
            font-size: 24px;
            font-weight: 900;
            color: #000;
            margin-bottom: 10px;
        }

        .login-header p {
            font-size: 14px;
            color: #555;
            font-weight: 700;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 900;
            font-size: 15px;
            color: #000;
        }

        .form-control {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #000;
            font-weight: 900;
            font-size: 16px;
            background: #fff;
            outline: none;
            transition: 0.2s;
        }

        .form-control:focus {
            background: #fbfbfb;
            box-shadow: 0 0 0 3px rgba(0,0,0,0.05);
        }

        .btn-submit {
            width: 100%;
            background: #000;
            color: #fff;
            border: 2px solid #000;
            padding: 12px;
            font-weight: 900;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }

        .btn-submit:hover {
            background: #fff;
            color: #000;
        }

        .error-banner {
            background: #ffcccc;
            border: 2px solid #8b0000;
            color: #8b0000;
            padding: 12px;
            margin-bottom: 20px;
            font-weight: 900;
            font-size: 14px;
            text-align: center;
        }

        .custom-alert-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(8px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 99999;
            animation: fadeIn 0.3s ease;
        }

        .custom-alert-box {
            background: #ffffff;
            width: 90%;
            max-width: 500px;
            border-radius: 24px;
            padding: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            border: 1px solid rgba(0,0,0,0.1);
            text-align: center;
            transform: scale(0.9);
            transition: transform 0.3s ease;
        }

        .custom-alert-title {
            font-size: 1.4rem;
            font-weight: 800;
            color: #111;
            margin-bottom: 15px;
        }

        .custom-alert-message {
            font-size: 1.05rem;
            color: #444;
            line-height: 1.6;
            margin-bottom: 25px;
            font-weight: 600;
        }

        .custom-alert-btn {
            background: #000000;
            color: #ffffff;
            border: none;
            padding: 12px 35px;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: 0.2s;
        }

        .custom-alert-btn:hover {
            background: #333333;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
    </style>
</head>
<body>

<div class="login-card">
    <div class="login-header">
        <h1>منظومة مكة الذكية</h1>
        <p>بوابة الوصول الموحدة للفرق الطبية والقيادية</p>
    </div>

    {% if error %}
    <div class="error-banner">
        {{ error }}
    </div>
    {% endif %}

    <form method="POST" id="loginForm" action="/login">
        <div class="form-group">
            <label for="username">اسم المستخدم</label>
            <input type="text" id="username" name="username" class="form-control" placeholder="أدخل اسم المستخدم المعياري" required autocomplete="off">
        </div>

        <div class="form-group">
            <label for="password">كلمة المرور الآمنة</label>
            <input type="password" id="password" name="password" class="form-control" placeholder="••••••••" required>
        </div>

        <button type="submit" class="btn-submit">تسجيل الدخول إلى النظام</button>
    </form>
</div>

<div id="customAlert" class="custom-alert-overlay">
    <div class="custom-alert-box" id="customAlertBox">
        <div class="custom-alert-title" id="customAlertTitle">تنبيه النظام</div>
        <div class="custom-alert-message" id="customAlertMessage"></div>
        <button class="custom-alert-btn" onclick="closeCustomAlert()">موافق</button>
    </div>
</div>

<script>
function showCustomAlert(title, message) {
    document.getElementById('customAlertTitle').innerText = title;
    document.getElementById('customAlertMessage').innerText = message;
    const alertOverlay = document.getElementById('customAlert');
    alertOverlay.style.display = 'flex';
    setTimeout(() => {
        document.getElementById('customAlertBox').style.transform = 'scale(1)';
    }, 10);
}

function closeCustomAlert() {
    document.getElementById('customAlertBox').style.transform = 'scale(0.9)';
    setTimeout(() => {
        document.getElementById('customAlert').style.display = 'none';
    }, 150);
}

window.addEventListener('DOMContentLoaded', () => {
    const urlParams = new URLSearchParams(window.location.search);
    if (urlParams.has('error_alert')) {
        showCustomAlert("⚠️ فشل الدخول", urlParams.get('error_alert'));
    }
});
</script>

</body>
</html>
